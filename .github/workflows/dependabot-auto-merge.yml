name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Decide whether this PR may auto-merge
        id: policy
        shell: bash
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          DEP_NAMES="${{ steps.metadata.outputs.dependency-names }}"
      
          allow="false"
          reasons=()
      
          echo "Update type: $UPDATE_TYPE"
          echo "Dependencies: $DEP_NAMES"
      
          # Rule 1: only patch allowed
          if [ "$UPDATE_TYPE" = "version-update:semver-patch" ]; then
            allow="true"
          else
            reasons+=("Not a patch update ($UPDATE_TYPE)")
          fi
      
          # Rule 2: deny risky packages
          if echo "$DEP_NAMES" | grep -Eiq '(webpack|vite|rollup|esbuild|typescript|babel|swc|next|react-scripts|jsonwebtoken|passport|bcrypt|node-forge)'; then
            allow="false"
            reasons+=("Contains sensitive package")
          fi
      
          # Rule 3: manual override label
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -iq 'manual-review'; then
            allow="false"
            reasons+=("manual-review label present")
          fi
      
          # Build reason string
          if [ ${#reasons[@]} -eq 0 ]; then
            reason_str="Allowed"
          else
            reason_str=$(printf "%s; " "${reasons[@]}")
          fi
      
          echo "allow=$allow" >> "$GITHUB_OUTPUT"
          echo "reason=$reason_str" >> "$GITHUB_OUTPUT"
      
          echo "Decision: allow=$allow"
          echo "Reason: $reason_str"
    
      - name: Enable auto-merge
        if: steps.policy.outputs.allow == 'true' && !contains(github.event.pull_request.labels.*.name, 'manual-review')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
